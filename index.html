<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor De Moedas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&family=Tomorrow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>Conversor De Moedas</h1>
        <form class="converter-form" id="converterForm">
            <div class="currency-row">
                <div class="currency-input">
                    <label for="amount">Valor</label>
                    <input type="number" id="amount" placeholder="Digite o valor" step="0.1" min="0" required>
                </div>

                <div class="currency-select">
                    <label for="fromCurrency">De</label>
                    <select id="fromCurrency" required>
                        <option value="BRL" selected>Real Brasileiro</option>
                        <option value="USD">Dólar Americano</option>
                        <option value="EUR">Euro</option>
                        <option value="JPY">Iene Japonês</option>
                        <option value="GBP">Libra Esterlina</option>
                        <option value="CAD">Dólar Canadense</option>
                    </select>
                </div>
            </div>


            <div class="currency-row">
                <div class="currency-input">
                    <label for="convertedAmount">Resultado</label>
                    <input type="text" id="convertedAmount" placeholder="Valor convertido" readonly>
                </div>

                <div class="currency-select">
                    <label for="toCurrency">Para:</label>
                    <select id="toCurrency" required>
                        <option value="BRL">Real Brasileiro</option>
                        <option value="USD" selected>Dólar Americano</option>
                        <option value="EUR">Euro</option>
                        <option value="JPY">Iene Japonês</option>
                        <option value="GBP">Libra Esterlina</option>
                        <option value="CAD">Dólar Canadense</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="converter-btn" id="converterBtn"> 💰 Converter Moeda</button>
        </form>

        <div class="loading">
            <div class="spinner"></div>
            <p>Convertendo...</p>
        </div>

        <div class="result"></div>
        <div class="error"></div>

        <div class="info">
            <p> ✅ Taxas atualizadas em tempo real</p>
        </div>
    </div>


</body>
<script src="script.js"></script>

</html>
